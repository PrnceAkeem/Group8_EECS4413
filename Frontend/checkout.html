<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Checkout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4" style="max-width:900px">
    <a href="/cart.html" class="text-muted fw-bold text-decoration-none">← Back to Cart</a>
    <h2 class="mt-3 mb-4">Checkout</h2>

    <div class="row g-4">

      <div class="col-md-7">

        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="card-title mb-0">Shipping Address</h5>
              <button class="btn btn-sm btn-outline-dark" type="button" onclick="toggleAddressForm()">
                Add New Address
              </button>
            </div>

            <div id="address-section"></div>

            <div id="address-form-wrap" class="mt-3" style="display:none;">
              <div class="border rounded p-3 bg-light">
                <h6 class="fw-bold mb-3">Add Shipping Address</h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Recipient Name</label>
                    <input type="text" class="form-control" id="recipientName" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Label</label>
                    <input type="text" class="form-control" id="addrLabel" value="home" />
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-bold">Street</label>
                    <input type="text" class="form-control" id="streetLine1" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">City</label>
                    <input type="text" class="form-control" id="city" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label fw-bold">Province</label>
                    <input type="text" class="form-control" id="province" value="ON" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label fw-bold">Postal Code</label>
                    <input type="text" class="form-control" id="postalCode" />
                  </div>
                  <div class="col-md-6">
                    <div class="form-check mt-2">
                      <input class="form-check-input" type="checkbox" id="isDefaultShipping" checked />
                      <label class="form-check-label fw-bold" for="isDefaultShipping">Default Shipping</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check mt-2">
                      <input class="form-check-input" type="checkbox" id="isDefaultBilling" checked />
                      <label class="form-check-label fw-bold" for="isDefaultBilling">Default Billing</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-dark mt-3 fw-bold" type="button" onclick="saveAddressInline()">Save Address</button>
                <p id="addr-msg" class="mt-2 fw-bold"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="card-title mb-0">Payment Method</h5>
              <button class="btn btn-sm btn-outline-dark" type="button" onclick="togglePaymentForm()">
                Add New Payment Method
              </button>
            </div>

            <div id="payment-section"></div>

            <div id="payment-form-wrap" class="mt-3" style="display:none;">
              <div class="border rounded p-3 bg-light">
                <h6 class="fw-bold mb-3">Add Payment Method</h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Cardholder Name</label>
                    <input type="text" class="form-control" id="cardholderName" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Card Brand</label>
                    <input type="text" class="form-control" id="cardBrand" placeholder="Visa" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Last 4 Digits</label>
                    <input type="text" class="form-control" id="cardLast4" maxlength="4" placeholder="1234" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Expiry Month</label>
                    <input type="number" class="form-control" id="expiryMonth" min="1" max="12" placeholder="10" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Expiry Year</label>
                    <input type="number" class="form-control" id="expiryYear" min="2024" placeholder="2028" />
                  </div>
                  <div class="col-12">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="payDefault" checked />
                      <label class="form-check-label fw-bold" for="payDefault">Set as Default</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-dark mt-3 fw-bold" type="button" onclick="savePaymentInline()">Save Payment Method</button>
                <p id="pay-msg" class="mt-2 fw-bold"></p>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Order Summary</h5>
            <div id="summary-section"></div>
            <div id="msg" class="mt-2 fw-bold"></div>
            <button class="btn btn-dark w-100 mt-3 fw-bold" id="place-btn" onclick="placeOrder()">Place Order</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/checkout.js"></script>

</body>
</html>
