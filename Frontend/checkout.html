<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Checkout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4" style="max-width:900px">
    <a href="/cart.html" class="text-muted fw-bold text-decoration-none">← Back to Cart</a>
    <h2 class="mt-3 mb-4">Checkout</h2>

    <div class="row g-4">

      <div class="col-md-7">
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="card-title">Shipping Address</h5>
            <div id="address-section"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Payment Method</h5>
            <div id="payment-section"></div>
          </div>
        </div>
      </div>

      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Order Summary</h5>
            <div id="summary-section"></div>
            <div id="msg" class="mt-2 fw-bold"></div>
            <button class="btn btn-dark w-100 mt-3 fw-bold" id="place-btn" onclick="placeOrder()">Place Order</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/checkout.js"></script>

</body>
</html>
