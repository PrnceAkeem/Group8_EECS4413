<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Checkout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4" style="max-width:900px">
    <a href="/cart.html" class="text-muted fw-bold text-decoration-none">← Back to Cart</a>
    <h2 class="mt-3 mb-4">Checkout</h2>

    <div class="row g-4">

      <div class="col-md-7">

        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="card-title mb-0">Shipping Address</h5>
              <button class="btn btn-sm btn-outline-dark" type="button" onclick="toggleAddressForm()">
                Add New Address
              </button>
            </div>

            <div id="address-section"></div>

            <div id="address-form-wrap" class="mt-3" style="display:none;">
              <div class="border rounded p-3 bg-light">
                <h6 class="fw-bold mb-3">Add Shipping Address</h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Recipient Name</label>
                    <input type="text" class="form-control" id="recipientName" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Label</label>
                    <input type="text" class="form-control" id="addrLabel" value="home" />
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-bold">Street</label>
                    <input type="text" class="form-control" id="streetLine1" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">City</label>
                    <input type="text" class="form-control" id="city" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label fw-bold">Province</label>
                    <input type="text" class="form-control" id="province" value="ON" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label fw-bold">Postal Code</label>
                    <input type="text" class="form-control" id="postalCode" />
                  </div>
                  <div class="col-md-6">
                    <div class="form-check mt-2">
                      <input class="form-check-input" type="checkbox" id="isDefaultShipping" checked />
                      <label class="form-check-label fw-bold" for="isDefaultShipping">Default Shipping</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check mt-2">
                      <input class="form-check-input" type="checkbox" id="isDefaultBilling" checked />
                      <label class="form-check-label fw-bold" for="isDefaultBilling">Default Billing</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-dark mt-3 fw-bold" type="button" onclick="saveAddressInline()">Save Address</button>
                <p id="addr-msg" class="mt-2 fw-bold"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="card-title mb-0">Payment Method</h5>
              <button class="btn btn-sm btn-outline-dark" type="button" onclick="togglePaymentForm()">
                Add New Payment Method
              </button>
            </div>

            <div id="payment-section"></div>

            <div id="payment-form-wrap" class="mt-3" style="display:none;">
              <div class="border rounded p-3 bg-light">
                <h6 class="fw-bold mb-3">Add Payment Method</h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Cardholder Name</label>
                    <input type="text" class="form-control" id="cardholderName" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">Card Brand</label>
                    <input type="text" class="form-control" id="cardBrand" placeholder="Visa" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Last 4 Digits</label>
                    <input type="text" class="form-control" id="cardLast4" maxlength="4" placeholder="1234" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Expiry Month</label>
                    <input type="number" class="form-control" id="expiryMonth" min="1" max="12" placeholder="10" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label fw-bold">Expiry Year</label>
                    <input type="number" class="form-control" id="expiryYear" min="2024" placeholder="2028" />
                  </div>
                  <div class="col-12">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="payDefault" checked />
                      <label class="form-check-label fw-bold" for="payDefault">Set as Default</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-dark mt-3 fw-bold" type="button" onclick="savePaymentInline()">Save Payment Method</button>
                <p id="pay-msg" class="mt-2 fw-bold"></p>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Order Summary</h5>
            <div id="summary-section"></div>
            <div id="msg" class="mt-2 fw-bold"></div>
            <button class="btn btn-dark w-100 mt-3 fw-bold" id="place-btn" onclick="placeOrder()">Place Order</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let profile = null;
    let cartItems = [];
    let subtotalCents = 0;

    async function loadNav() {
      const res = await fetch('/api/auth/me').catch(() => null);
      const el = document.getElementById('nav-actions');
      if (res && res.ok) {
        const data = await res.json();
        el.innerHTML = `
          <span style="color:#fff;font-weight:700">Hi, ${data.user.firstName}</span>
          <a class="nav-link" href="/cart.html">Cart</a>
          <a class="nav-link" href="/profile.html">Profile</a>
          <button class="nav-link" onclick="logout()">Sign Out</button>
        `;
      } else {
        window.location.href = '/login.html?next=/checkout.html';
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/catalog.html';
    }

    async function loadData() {
      const authRes = await fetch('/api/auth/me');
      if (!authRes.ok) {
        window.location.href = '/login.html?next=/checkout.html';
        return;
      }

      const [profileRes, cartRes] = await Promise.all([
        fetch('/api/profile'),
        fetch('/api/cart')
      ]);

      profile = await profileRes.json();
      const cartData = await cartRes.json();
      cartItems = cartData.items || [];
      subtotalCents = cartData.subtotalCents || 0;

      renderAddress();
      renderPayment();
      renderSummary();
    }

    function toggleAddressForm() {
      const el = document.getElementById('address-form-wrap');
      el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    function togglePaymentForm() {
      const el = document.getElementById('payment-form-wrap');
      el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    function renderAddress() {
      const el = document.getElementById('address-section');
      const addresses = profile.addresses || [];

      if (addresses.length === 0) {
        el.innerHTML = `<p class="text-muted small">No saved addresses yet. Add one below.</p>`;
        return;
      }

      el.innerHTML = addresses.map(a => `
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="address" value="${a.addressId}" id="addr-${a.addressId}" ${a.isDefaultShipping ? 'checked' : ''}>
          <label class="form-check-label" for="addr-${a.addressId}">
            <strong>${a.recipientName}</strong> — ${a.streetLine1}, ${a.city}, ${a.province} ${a.postalCode}
          </label>
        </div>
      `).join('');
    }

    function renderPayment() {
      const el = document.getElementById('payment-section');
      const methods = profile.paymentMethods || [];

      if (methods.length === 0) {
        el.innerHTML = `<p class="text-muted small">No saved payment methods yet. Add one below.</p>`;
        return;
      }

      el.innerHTML = methods.map(m => `
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="payment" value="${m.paymentMethodId}" id="pay-${m.paymentMethodId}" ${m.isDefault ? 'checked' : ''}>
          <label class="form-check-label" for="pay-${m.paymentMethodId}">
            ${m.cardBrand} ending in ${m.cardLast4} — expires ${m.expiryMonth}/${m.expiryYear}
          </label>
        </div>
      `).join('');
    }

    function renderSummary() {
      const shipping = 1200;
      const tax = Math.round(subtotalCents * 0.13);
      const total = subtotalCents + shipping + tax;

      document.getElementById('summary-section').innerHTML = `
        <div class="d-flex justify-content-between mb-1"><span>Subtotal</span><span>$${(subtotalCents / 100).toFixed(2)}</span></div>
        <div class="d-flex justify-content-between mb-1"><span>Shipping</span><span>$${(shipping / 100).toFixed(2)}</span></div>
        <div class="d-flex justify-content-between mb-2"><span>Tax (13%)</span><span>$${(tax / 100).toFixed(2)}</span></div>
        <div class="d-flex justify-content-between fw-bold border-top pt-2"><span>Total</span><span>$${(total / 100).toFixed(2)}</span></div>
      `;
    }

    async function saveAddressInline() {
      const msg = document.getElementById('addr-msg');

      const body = {
        label: document.getElementById('addrLabel').value.trim(),
        recipientName: document.getElementById('recipientName').value.trim(),
        streetLine1: document.getElementById('streetLine1').value.trim(),
        city: document.getElementById('city').value.trim(),
        province: document.getElementById('province').value.trim(),
        postalCode: document.getElementById('postalCode').value.trim(),
        country: 'Canada',
        isDefaultShipping: document.getElementById('isDefaultShipping').checked,
        isDefaultBilling: document.getElementById('isDefaultBilling').checked
      };

      if (!body.recipientName || !body.streetLine1 || !body.city || !body.province || !body.postalCode) {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = 'Please fill in all address fields.';
        return;
      }

      const res = await fetch('/api/profile/addresses', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        msg.className = 'mt-2 fw-bold text-success';
        msg.textContent = 'Address saved!';
        document.getElementById('address-form-wrap').style.display = 'none';
        await refreshProfile();
      } else {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = data.message || 'Failed to save address.';
      }
    }

    async function savePaymentInline() {
      const msg = document.getElementById('pay-msg');

      const body = {
        cardholderName: document.getElementById('cardholderName').value.trim(),
        cardBrand: document.getElementById('cardBrand').value.trim(),
        cardLast4: document.getElementById('cardLast4').value.trim(),
        expiryMonth: parseInt(document.getElementById('expiryMonth').value, 10),
        expiryYear: parseInt(document.getElementById('expiryYear').value, 10),
        isDefault: document.getElementById('payDefault').checked
      };

      if (!body.cardholderName || !body.cardBrand || !body.cardLast4 || !body.expiryMonth || !body.expiryYear) {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = 'Please fill in all payment fields.';
        return;
      }

      const res = await fetch('/api/profile/payment-methods', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        msg.className = 'mt-2 fw-bold text-success';
        msg.textContent = 'Payment method saved!';
        document.getElementById('payment-form-wrap').style.display = 'none';
        await refreshProfile();
      } else {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = data.message || 'Failed to save payment method.';
      }
    }

    async function refreshProfile() {
      const profileRes = await fetch('/api/profile');
      profile = await profileRes.json();
      renderAddress();
      renderPayment();
    }

    async function placeOrder() {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('place-btn');

      const addrEl = document.querySelector('input[name="address"]:checked');
      const payEl = document.querySelector('input[name="payment"]:checked');

      if (!addrEl || !payEl) {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = 'Please select a shipping address and payment method.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Processing...';
      msg.textContent = '';

      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          shippingAddressId: addrEl.value,
          paymentMethodId: payEl.value
        })
      });

      const data = await res.json();

      if (res.ok) {
        window.location.href = `/orders.html?confirmed=${data.order.orderId}`;
      } else {
        msg.className = 'mt-2 fw-bold text-danger';
        msg.textContent = data.message || 'Credit Card Authorization Failed.';
        btn.disabled = false;
        btn.textContent = 'Place Order';
      }
    }

    loadNav();
    loadData();
  </script>

</body>
</html>
