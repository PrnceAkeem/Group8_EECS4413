<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Shop</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/catalog.css" />
</head>
<body class="page">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div class="nav-search">
      <input id="search-input" type="text" placeholder="Search shoes..." />
    </div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="top-banner">
    <div class="top-banner-content">
      <p class="banner-label">Streetwear Footwear</p>
      <p class="banner-copy">Shop trending sneakers, everyday essentials, and the newest drops in one place.</p>
    </div>
  </div>

  <div class="catalog-body">

    <section class="products-section">
      <div class="products-topbar">
        <h2 id="results-heading">All Shoes</h2>
        <select class="sort-select" id="sort-select">
          <option value="">Sort: Default</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name_asc">Name: A–Z</option>
          <option value="name_desc">Name: Z–A</option>
        </select>
      </div>
      <div class="products-grid" id="products-grid"></div>
    </section>

    <aside class="filters-panel">
      <h3>Filter by Brand</h3>
      <div class="filter-group">
        <div id="brand-filters"></div>
      </div>
      <button class="filter-clear" id="clear-btn">Clear</button>
    </aside>

  </div>

  <script src="/js/catalog.js"></script>

</body>
</html>
