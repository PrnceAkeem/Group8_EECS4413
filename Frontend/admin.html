<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/admin.html">6ixOutside Admin</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Admin Panel</h2>

    <ul class="nav nav-tabs mb-4" id="admin-tabs">
      <li class="nav-item"><button class="nav-link active" onclick="showTab('orders')">Sales History</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('inventory')">Inventory</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('customers')">Customers</button></li>
    </ul>

    <div id="tab-orders">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">All Orders</h5>
          <div id="orders-table"></div>
        </div>
      </div>
    </div>

    <div id="tab-inventory" style="display:none">
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">Products</h5>
          <div id="inventory-table"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Add New Product</h5>
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label fw-bold">Product ID</label><input type="text" class="form-control" id="new-id" placeholder="SNK-BRAND-XXX" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Name</label><input type="text" class="form-control" id="new-name" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Model</label><input type="text" class="form-control" id="new-model" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Brand ID</label><input type="number" class="form-control" id="new-brand" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Category ID</label><input type="number" class="form-control" id="new-cat" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Price (cents)</label><input type="number" class="form-control" id="new-price" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Inventory</label><input type="number" class="form-control" id="new-qty" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Size Range</label><input type="text" class="form-control" id="new-size" placeholder="US 7-13" /></div>
            <div class="col-md-4"><label class="form-label fw-bold">Release Year</label><input type="number" class="form-control" id="new-year" /></div>
            <div class="col-12"><label class="form-label fw-bold">Description</label><textarea class="form-control" id="new-desc" rows="2"></textarea></div>
            <div class="col-md-6"><label class="form-label fw-bold">Colorway</label><input type="text" class="form-control" id="new-colorway" /></div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="addProduct()">Add Product</button>
          <p id="add-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-customers" style="display:none">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">All Customers</h5>
          <div id="customers-table"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/admin.js"></script>

</body>
</html>
