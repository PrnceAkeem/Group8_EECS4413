<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4" style="max-width:860px">
    <h2 class="mb-4">My Profile</h2>

    <ul class="nav nav-tabs mb-4" id="profile-tabs">
      <li class="nav-item"><button class="nav-link active" onclick="showTab('info')">Personal Info</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('address')">Address</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('payment')">Payment</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('orders')">Order History</button></li>
    </ul>

    <div id="tab-info">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Personal Information</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">First Name</label>
              <input type="text" class="form-control" id="firstName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Last Name</label>
              <input type="text" class="form-control" id="lastName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Date of Birth</label>
              <input type="date" class="form-control" id="dob" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Phone</label>
              <input type="text" class="form-control" id="phone" placeholder="Optional" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email</label>
              <input type="text" class="form-control" id="email" disabled />
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="saveInfo()">Save Changes</button>
          <p id="info-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-address" style="display:none">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Shipping / Billing Address</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Recipient Name</label>
              <input type="text" class="form-control" id="recipientName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Label (e.g. home)</label>
              <input type="text" class="form-control" id="addrLabel" value="home" />
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Street</label>
              <input type="text" class="form-control" id="streetLine1" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">City</label>
              <input type="text" class="form-control" id="city" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Province</label>
              <input type="text" class="form-control" id="province" value="ON" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Postal Code</label>
              <input type="text" class="form-control" id="postalCode" />
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="isDefaultShipping" checked />
                <label class="form-check-label fw-bold" for="isDefaultShipping">Default Shipping</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="isDefaultBilling" checked />
                <label class="form-check-label fw-bold" for="isDefaultBilling">Default Billing</label>
              </div>
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="saveAddress()">Save Address</button>
          <p id="addr-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-payment" style="display:none">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Payment Method</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Cardholder Name</label>
              <input type="text" class="form-control" id="cardholderName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Card Brand (e.g. Visa)</label>
              <input type="text" class="form-control" id="cardBrand" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Last 4 Digits</label>
              <input type="text" class="form-control" id="cardLast4" maxlength="4" placeholder="1234" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Expiry Month</label>
              <input type="number" class="form-control" id="expiryMonth" min="1" max="12" placeholder="10" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Expiry Year</label>
              <input type="number" class="form-control" id="expiryYear" min="2024" placeholder="2028" />
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="payDefault" checked />
                <label class="form-check-label fw-bold" for="payDefault">Set as Default</label>
              </div>
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="savePayment()">Save Payment Method</button>
          <p id="pay-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-orders" style="display:none">
      <div id="orders-list"></div>
    </div>

  </div>

  <script src="/js/profile.js"></script>

</body>
</html>
