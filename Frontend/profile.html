<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6ixOutside — Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-light">

  <nav class="nav">
    <a class="nav-logo" href="/catalog.html">6ixOutside</a>
    <div></div>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container py-4" style="max-width:860px">
    <h2 class="mb-4">My Profile</h2>

    <ul class="nav nav-tabs mb-4" id="profile-tabs">
      <li class="nav-item"><button class="nav-link active" onclick="showTab('info')">Personal Info</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('address')">Address</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('payment')">Payment</button></li>
      <li class="nav-item"><button class="nav-link" onclick="showTab('orders')">Order History</button></li>
    </ul>

    <div id="tab-info">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Personal Information</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">First Name</label>
              <input type="text" class="form-control" id="firstName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Last Name</label>
              <input type="text" class="form-control" id="lastName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Date of Birth</label>
              <input type="date" class="form-control" id="dob" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Phone</label>
              <input type="text" class="form-control" id="phone" placeholder="Optional" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email</label>
              <input type="text" class="form-control" id="email" disabled />
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="saveInfo()">Save Changes</button>
          <p id="info-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-address" style="display:none">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Shipping / Billing Address</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Recipient Name</label>
              <input type="text" class="form-control" id="recipientName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Label (e.g. home)</label>
              <input type="text" class="form-control" id="addrLabel" value="home" />
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Street</label>
              <input type="text" class="form-control" id="streetLine1" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">City</label>
              <input type="text" class="form-control" id="city" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Province</label>
              <input type="text" class="form-control" id="province" value="ON" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Postal Code</label>
              <input type="text" class="form-control" id="postalCode" />
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="isDefaultShipping" checked />
                <label class="form-check-label fw-bold" for="isDefaultShipping">Default Shipping</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="isDefaultBilling" checked />
                <label class="form-check-label fw-bold" for="isDefaultBilling">Default Billing</label>
              </div>
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="saveAddress()">Save Address</button>
          <p id="addr-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-payment" style="display:none">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">Payment Method</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Cardholder Name</label>
              <input type="text" class="form-control" id="cardholderName" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Card Brand (e.g. Visa)</label>
              <input type="text" class="form-control" id="cardBrand" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Last 4 Digits</label>
              <input type="text" class="form-control" id="cardLast4" maxlength="4" placeholder="1234" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Expiry Month</label>
              <input type="number" class="form-control" id="expiryMonth" min="1" max="12" placeholder="10" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Expiry Year</label>
              <input type="number" class="form-control" id="expiryYear" min="2024" placeholder="2028" />
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="payDefault" checked />
                <label class="form-check-label fw-bold" for="payDefault">Set as Default</label>
              </div>
            </div>
          </div>
          <button class="btn btn-dark mt-3 fw-bold" onclick="savePayment()">Save Payment Method</button>
          <p id="pay-msg" class="mt-2 fw-bold"></p>
        </div>
      </div>
    </div>

    <div id="tab-orders" style="display:none">
      <div id="orders-list"></div>
    </div>

  </div>

  <script>
    let existingAddressId = null;
    let existingPaymentMethodId = null;

    function showTab(tab) {
      ['info','address','payment','orders'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
      });
      document.querySelectorAll('#profile-tabs .nav-link').forEach((btn, i) => {
        btn.classList.toggle('active', ['info','address','payment','orders'][i] === tab);
      });
      if (tab === 'orders') loadOrders();
    }

    async function loadNav() {
      const res = await fetch('/api/auth/me').catch(() => null);
      const el = document.getElementById('nav-actions');
      if (res && res.ok) {
        const data = await res.json();
        el.innerHTML = `
          <span style="color:#fff;font-weight:700">Hi, ${data.user.firstName}</span>
          <a class="nav-link" href="/cart.html">Cart</a>
          <button class="nav-link" onclick="logout()">Sign Out</button>
        `;
      } else {
        window.location.href = '/login.html?next=/profile.html';
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/catalog.html';
    }

    async function loadProfile() {
      const authRes = await fetch('/api/auth/me');
      if (!authRes.ok) { window.location.href = '/login.html?next=/profile.html'; return; }

      const res = await fetch('/api/profile');
      const data = await res.json();

      document.getElementById('firstName').value = data.customer.firstName || '';
      document.getElementById('lastName').value  = data.customer.lastName  || '';
      document.getElementById('dob').value       = data.customer.dob ? data.customer.dob.split('T')[0] : '';
      document.getElementById('phone').value     = data.customer.phone || '';
      document.getElementById('email').value     = data.customer.email || '';

      const addr = (data.addresses || []).find(a => a.isDefaultShipping) || data.addresses?.[0];
      if (addr) {
        existingAddressId = addr.addressId;
        document.getElementById('recipientName').value = addr.recipientName || '';
        document.getElementById('addrLabel').value     = addr.label || 'home';
        document.getElementById('streetLine1').value   = addr.streetLine1 || '';
        document.getElementById('city').value          = addr.city || '';
        document.getElementById('province').value      = addr.province || 'ON';
        document.getElementById('postalCode').value    = addr.postalCode || '';
        document.getElementById('isDefaultShipping').checked = addr.isDefaultShipping;
        document.getElementById('isDefaultBilling').checked  = addr.isDefaultBilling;
      }

      const pay = (data.paymentMethods || []).find(p => p.isDefault) || data.paymentMethods?.[0];
      if (pay) {
        existingPaymentMethodId = pay.paymentMethodId;
        document.getElementById('cardholderName').value = pay.cardholderName || '';
        document.getElementById('cardBrand').value      = pay.cardBrand || '';
        document.getElementById('cardLast4').value      = pay.cardLast4 || '';
        document.getElementById('expiryMonth').value    = pay.expiryMonth || '';
        document.getElementById('expiryYear').value     = pay.expiryYear || '';
        document.getElementById('payDefault').checked   = pay.isDefault;
      }
    }

    async function saveInfo() {
      const msg = document.getElementById('info-msg');
      const res = await fetch('/api/profile', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstName: document.getElementById('firstName').value.trim(),
          lastName:  document.getElementById('lastName').value.trim(),
          dob:       document.getElementById('dob').value,
          phone:     document.getElementById('phone').value.trim() || null
        })
      });
      const data = await res.json();
      msg.className = res.ok ? 'mt-2 fw-bold text-success' : 'mt-2 fw-bold text-danger';
      msg.textContent = res.ok ? 'Saved!' : (data.message || 'Failed to save.');
    }

    async function saveAddress() {
      const msg = document.getElementById('addr-msg');
      const body = {
        label:             document.getElementById('addrLabel').value.trim(),
        recipientName:     document.getElementById('recipientName').value.trim(),
        streetLine1:       document.getElementById('streetLine1').value.trim(),
        city:              document.getElementById('city').value.trim(),
        province:          document.getElementById('province').value.trim(),
        postalCode:        document.getElementById('postalCode').value.trim(),
        country:           'Canada',
        isDefaultShipping: document.getElementById('isDefaultShipping').checked,
        isDefaultBilling:  document.getElementById('isDefaultBilling').checked
      };
      if (existingAddressId) body.addressId = existingAddressId;

      const res = await fetch('/api/profile/addresses', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      msg.className = res.ok ? 'mt-2 fw-bold text-success' : 'mt-2 fw-bold text-danger';
      msg.textContent = res.ok ? 'Address saved!' : (data.message || 'Failed to save.');
      if (res.ok && data.address) existingAddressId = data.address.addressId;
    }

    async function savePayment() {
      const msg = document.getElementById('pay-msg');
      const body = {
        cardholderName: document.getElementById('cardholderName').value.trim(),
        cardBrand:      document.getElementById('cardBrand').value.trim(),
        cardLast4:      document.getElementById('cardLast4').value.trim(),
        expiryMonth:    parseInt(document.getElementById('expiryMonth').value, 10),
        expiryYear:     parseInt(document.getElementById('expiryYear').value, 10),
        isDefault:      document.getElementById('payDefault').checked
      };
      if (existingPaymentMethodId) body.paymentMethodId = existingPaymentMethodId;

      const res = await fetch('/api/profile/payment-methods', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      msg.className = res.ok ? 'mt-2 fw-bold text-success' : 'mt-2 fw-bold text-danger';
      msg.textContent = res.ok ? 'Payment method saved!' : (data.message || 'Failed to save.');
      if (res.ok && data.paymentMethod) existingPaymentMethodId = data.paymentMethod.paymentMethodId;
    }

    async function loadOrders() {
      const res = await fetch('/api/orders');
      const data = await res.json();
      const el = document.getElementById('orders-list');
      if (!data.orders || data.orders.length === 0) {
        el.innerHTML = '<p class="text-muted">No orders yet.</p>';
        return;
      }
      el.innerHTML = data.orders.map(o => `
        <div class="card mb-3">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <strong>Order #${o.orderId}</strong>
              <span class="ms-3 text-muted">${new Date(o.placedAt).toLocaleDateString()}</span>
              <span class="ms-3 badge bg-secondary">${o.orderStatus}</span>
            </div>
            <div class="fw-bold">$${(o.totalCents / 100).toFixed(2)}</div>
          </div>
        </div>
      `).join('');
    }

    loadNav();
    loadProfile();
  </script>

</body>
</html>
