services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sixoutsidedb}
      POSTGRES_USER: ${POSTGRES_USER:-sixoutside}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sixpassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5050
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sixoutsidedb}
      DB_USER: ${POSTGRES_USER:-sixoutside}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sixpassword}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-before-production}
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - ./Frontend:/Frontend:ro
    ports:
      - "${BACKEND_PORT:-5050}:5050"
      - "3000:5050"
    restart: unless-stopped

volumes:
  postgres_data:
